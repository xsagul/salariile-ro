  <circle cx="430" cy="425" r="32" fill="#FAFAF7"/>

  <!-- Right side: editorial hero text -->
  <!-- Eyebrow label -->
  <text x="560" y="210" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="14" font-weight="600" fill="#888888" letter-spacing="2.5">
